spring:
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        schema:
          strategy: update
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.FluentAutoConfiguration
  datasource:
    commission:
      driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
      hikari:
        maximum-pool-size: 2
      password: ''
      url: jdbc:tc:postgresql:17.6:///agentBanking?TC_TMPFS=/testtmpfs:rw
      username: agentBanking
    rules:
      driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
      hikari:
        maximum-pool-size: 2
      password: ''
      url: jdbc:tc:postgresql:17.6:///agentBanking?TC_TMPFS=/testtmpfs:rw
      username: agentBanking
    ledger:
      driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
      hikari:
        maximum-pool-size: 2
      password: ''
      url: jdbc:tc:postgresql:17.6:///agentBanking?TC_TMPFS=/testtmpfs:rw
      username: agentBanking
    onboarding:
      driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
      hikari:
        maximum-pool-size: 2
      password: ''
      url: jdbc:tc:postgresql:17.6:///agentBanking?TC_TMPFS=/testtmpfs:rw
      username: agentBanking
    switchadapter:
      driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
      hikari:
        maximum-pool-size: 2
      password: ''
      url: jdbc:tc:postgresql:17.6:///agentBanking?TC_TMPFS=/testtmpfs:rw
      username: agentBanking
    biller:
      driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
      hikari:
        maximum-pool-size: 2
      password: ''
      url: jdbc:tc:postgresql:17.6:///agentBanking?TC_TMPFS=/testtmpfs:rw
      username: agentBanking
  data:
    redis:
      url: ${TEST_REDIS_URL}
  main:
    banner-mode: 'off'
    allow-bean-definition-overriding: true

archunit:
  failOnEmptyShould: false
logging:
  config: classpath:logback.xml
