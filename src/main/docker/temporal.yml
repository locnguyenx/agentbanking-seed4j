services:
  temporal:
    image: temporalio/auto-setup:1.24.0
    environment:
      - DB=postgres12
      - DB_PORT=5433
      - POSTGRES_USER=agentbanking
      - POSTGRES_PWD=agentbanking
      - POSTGRES_SEEDS=postgresql
      - DBNAME=temporal
      - VISIBILITY_DBNAME=temporal_visibility
    ports:
      - '127.0.0.1:7233:7233'
    depends_on:
      - postgresql

  temporal-ui:
    image: temporalio/ui:2.30.0
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    ports:
      - '127.0.0.1:8088:8080'
    depends_on:
      - temporal