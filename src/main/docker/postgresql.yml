# This configuration is intended for development purpose, it's **your** responsibility to harden it for production
services:
  postgresql:
    image: postgres:18.1
    environment:
      - POSTGRES_USER=agentbanking
      - POSTGRES_PASSWORD=agentbanking
      - POSTGRES_MULTIPLE_DATABASES=rules_db,ledger_db,onboarding_db,switch_db,biller_db
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - postgresql_data:/var/lib/postgresql/data
      - ./init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh

volumes:
  postgresql_data:
