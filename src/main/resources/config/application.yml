logging:
  level:
    com:
      agentbanking: INFO
spring:
  application:
    name: agentBanking
  jackson:
    default-property-inclusion: non_absent
  datasource:
    driver-class-name: org.postgresql.Driver
    hikari:
      auto-commit: false
      poolName: Hikari
    password: ''
    type: com.zaxxer.hikari.HikariDataSource
    url: jdbc:postgresql://localhost:5432/AgentBanking
    username: AgentBanking
  data:
    jpa:
      repositories:
        bootstrap-mode: deferred
  jpa:
    hibernate:
      ddl-auto: none
      naming:
        implicit-strategy: org.springframework.boot.hibernate.SpringImplicitNamingStrategy
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
    open-in-view: false
    properties:
      hibernate:
        connection:
          provider_disables_autocommit: true
        generate_statistics: false
        jdbc:
          batch_size: 25
          time_zone: UTC
        order_inserts: true
        order_updates: true
        query:
          fail_on_pagination_over_collection_fetch: true
          in_clause_parameter_padding: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  security:
    oauth2:
      client:
        provider:
          oidc:
            issuer-uri: http://localhost:9080/realms/seed4j
        registration:
          oidc:
            client-id: web_app
            client-secret: web_app
            scope: openid,profile,email
server:
  port: 8080
management:
  endpoint:
    health:
      access: read-only
      probes:
        enabled: true
      show-details: always
  endpoints:
    access:
      default: none
    jmx:
      exposure:
        exclude: '*'
    web:
      base-path: /management
      exposure:
        include:
        - configprops
        - env
        - health
        - info
        - logfile
        - loggers
        - threaddump
kafka:
  bootstrap-servers: localhost:9092
  consumer:
    '[auto.offset.reset]': earliest
    '[group.id]': myapp
    '[key.deserializer]': org.apache.kafka.common.serialization.StringDeserializer
    '[value.deserializer]': org.apache.kafka.common.serialization.StringDeserializer
  polling:
    timeout: 10000
  producer:
    '[key.serializer]': org.apache.kafka.common.serialization.StringSerializer
    '[value.serializer]': org.apache.kafka.common.serialization.StringSerializer
application:
  security:
    oauth2:
      audience: account,api://default
springdoc:
  enable-native-support: true
  swagger-ui:
    operationsSorter: alpha
    tagsSorter: alpha
    tryItOutEnabled: true
    oauth:
      client-id: web_app
      realm: seed4j
  oauth2:
    authorization-url: http://localhost:9080/realms/seed4j/protocol/openid-connect/auth

# Axon Framework configuration
axon:
  axonserver:
    servers: localhost:8124
  serializer:
    events: default
    messages: default
