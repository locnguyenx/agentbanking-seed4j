jacoco = "0.8.14"
spring-boot = "4.0.1"
spring-cloud = "2025.1.1"
springdoc-openapi = "3.0.0"
temporal = "1.25.1"

[libraries]
archunit-junit5-api = { group = "com.tngtech.archunit", name = "archunit-junit5-api", version.ref = "archunit-junit5" }
kafka-clients = { group = "org.apache.kafka", name = "kafka-clients", version.ref = "kafka-clients" }
testcontainers-postgresql = { group = "org.testcontainers", name = "postgresql", version.ref = "testcontainers" }
testcontainers-kafka = { group = "org.testcontainers", name = "kafka", version.ref = "testcontainers" }
postgresql = { group = "org.postgresql", name = "postgresql" }
commons-lang3 = { group = "org.apache.commons", name = "commons-lang3" }
hikariCP = { group = "com.zaxxer", name = "HikariCP" }
jjwt-api = { group = "io.jsonwebtoken", name = "jjwt-api", version.ref = "json-web-token" }
