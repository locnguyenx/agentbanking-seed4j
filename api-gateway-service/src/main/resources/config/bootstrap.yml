jhipster:
  registry:
    password: admin
spring:
  application:
    name: ApiGateway
  cloud:
    compatibility-verifier:
      enabled: false
    config:
      fail-fast: true
      label: main
      name: ApiGateway
      retry:
        initial-interval: 1000
        max-attempts: 100
        max-interval: 2000
      uri: http://admin:${jhipster.registry.password}@localhost:8761/config
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
              filters[0]:
                args[regexp]: '''/services/'' + serviceId.toLowerCase() + ''/(?<remaining>.*)'''
                args[replacement]: '''/${remaining}'''
                name: RewritePath
              lower-case-service-id: true
              predicates[0]:
                args[pattern]: '''/services/''+serviceId.toLowerCase()+''/**'''
                name: Path
