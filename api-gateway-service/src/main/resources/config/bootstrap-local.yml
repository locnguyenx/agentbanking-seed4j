jhipster:
  registry:
    password: admin
spring:
  application:
    name: ApiGateway
  cloud:
    compatibility-verifier:
      enabled: false
    config:
      fail-fast: false
      label: main
      name: ApiGateway
      retry:
        initial-interval: 1000
        max-attempts: 100
        max-interval: 2000
      uri: http://admin:${jhipster.registry.password}@localhost:8761/config
